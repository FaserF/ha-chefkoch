name: Auto Labeler

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

jobs:
  label-pr:
    name: Label Pull Requests
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true

  label-issue:
    name: Label Issues & Feature Requests
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Keyword Labeler
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const labelsToAdd = new Set();
            
            if (title.includes('bug') || title.includes('fix') || body.includes('bug report')) {
              labelsToAdd.add('bug');
            }
            if (title.includes('feat') || title.includes('enhancement') || body.includes('feature request')) {
              labelsToAdd.add('enhancement');
            }
            if (title.includes('docs') || title.includes('documentation') || title.includes('readme')) {
              labelsToAdd.add('documentation');
            }
            
            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: Array.from(labelsToAdd)
              });
            }

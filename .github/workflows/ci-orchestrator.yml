name: CI Orchestrator

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  workflow_call:
permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-ci
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14.6'
          cache: "pip"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements_test.txt ]; then pip install -r requirements_test.txt; fi
          pip install ruff mypy pyyaml pytest pytest-asyncio pytest-cov homeassistant paramiko aiohttp pytest-homeassistant-custom-component beautifulsoup4

      - name: Validate JSON/YAML
        run: |
          python -c "import json, glob; [json.load(open(f, encoding='utf-8-sig')) for f in glob.glob('**/*.json', recursive=True)]"
          python -c "import yaml, glob; yaml.add_multi_constructor('tag:yaml.org,2002:python/name:', lambda loader, suffix, node: None, Loader=yaml.SafeLoader); [yaml.safe_load(open(f, encoding='utf-8-sig')) for f in glob.glob('**/*.yaml', recursive=True) + glob.glob('**/*.yml', recursive=True)]"

      - name: Check Integration Structure
        run: |
          DOMAIN=$(python -c "import json, glob; print(json.load(open(glob.glob('custom_components/*/manifest.json')[0]))['domain'])")
          test -d "custom_components/$DOMAIN"
          test -f "custom_components/$DOMAIN/manifest.json"
          test -f hacs.json

      - name: Format and Fix with Ruff
        run: |
          ruff check --fix .
          ruff format .

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "style: auto-fix and format with Ruff [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Run Mypy
        run: |
          DOMAIN=$(python -c "import json, glob; print(json.load(open(glob.glob('custom_components/*/manifest.json')[0]))['domain'])")
          mypy "custom_components/$DOMAIN"

      - name: Run Tests
        run: |
          if [ -d tests ]; then
            DOMAIN=$(python -c "import json, glob; print(json.load(open(glob.glob('custom_components/*/manifest.json')[0]))['domain'])")
            pytest --cov="custom_components.$DOMAIN" --cov-report=xml
          else
            echo "No tests directory found, skipping."
            echo "<?xml version='1.0' ?><coverage></coverage>" > coverage.xml
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v7.0.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  hassfest:
    name: Validate with Hassfest
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: home-assistant/actions/hassfest@master

  hacs-validation:
    name: Validate HACS
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v7.0.0
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.36.2

  auto-merge:
    name: Auto Merge Renovate
    runs-on: ubuntu-latest
    needs: [lint-test, hassfest, hacs-validation, codeql]
    if: github.event_name == 'pull_request' && github.actor == 'renovate[bot]'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Enable Auto Merge
        run: gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

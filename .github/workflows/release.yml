---
name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release (stable, beta, nightly)"
        required: true
        default: "beta"
        type: choice
        options:
          - stable
          - beta
          - nightly

      version_override:
        description: "Manually override new version (e.g. 1.2.3 or 2026.6.2b1). Leave empty to use automatic calculation."
        required: false
        type: string
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/manifest.json'
      - '**/translations/**'
      - 'CHANGELOG.md'
      - '.github/workflows/issue-orchestrator.yml'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-release
  cancel-in-progress: true

jobs:
  versioning:
    name: Determine Version
    if: github.event_name == 'workflow_dispatch' || (github.event.head_commit != null && contains(github.event.head_commit.message, '[bump-version]'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
      is_prerelease: ${{ steps.get_version.outputs.is_prerelease }}
      release_body: ${{ steps.get_version.outputs.release_body }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Calculate Version and Release Details
        id: get_version
        shell: bash
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type || (contains(github.event.head_commit.message, '[bump-version]') && 'stable' || 'beta') }}
          BUMP_LEVEL: ${{ github.event.inputs.bump_level || 'patch' }}
          VERSION_OVERRIDE: ${{ inputs.version_override }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/calculate_release_details.py

      - name: Upload Release Body
        uses: actions/upload-artifact@v7
        with:
          name: release-body
          path: release_body.md

      - name: Prepare Initial Draft Body
        shell: bash
        run: |
          cp release_body.md initial_draft_body.md

      - name: Check and Delete Existing Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.get_version.outputs.tag }}
          VERSION: ${{ steps.get_version.outputs.version }}
        shell: bash
        run: |
          # Find and delete any existing draft release with same tag or title
          release_id=$(gh api "repos/$REPO/releases" --jq '.[] | select(.tag_name=="'$TAG'" or .name=="Release '$VERSION'") | select(.draft==true) | .id')
          if [ -n "$release_id" ]; then
            gh api -X DELETE "repos/$REPO/releases/$release_id"
          fi
          # Also check if the git tag already exists locally or remotely, delete it so we can re-create it
          git tag -d "$TAG" 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

      - name: Create Initial Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.get_version.outputs.tag }}
          VERSION: ${{ steps.get_version.outputs.version }}
          IS_PRERELEASE: ${{ steps.get_version.outputs.is_prerelease }}
        shell: bash
        run: |
          prerelease_arg=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            prerelease_arg="--prerelease"
          fi
          gh release create "$TAG" \
            --target "${{ github.ref_name }}" \
            --title "Release $VERSION" \
            --notes-file "initial_draft_body.md" \
            --draft \
            $prerelease_arg

  sync-version:
    name: Sync Repository Version
    needs: versioning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Configure Git and pull latest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git reset --hard HEAD
          git pull --rebase origin ${{ github.ref_name }}

      - name: Update Files
        shell: bash
        run: |
          python .github/scripts/version_manager.py bump --type ${{ github.event.inputs.release_type || (contains(github.event.head_commit.message, '[bump-version]') && 'stable' || 'beta') }} --level ${{ github.event.inputs.bump_level || 'patch' }} --override "${{ github.event.inputs.version_override || '' }}"

      - name: Commit and Push
        run: |
          git add custom_components/chefkoch_ha/manifest.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: release version ${{ needs.versioning.outputs.version }} [skip ci]"
            git push origin HEAD:${{ github.ref_name }} || (git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }})
          fi

      - name: Download Release Body
        uses: actions/download-artifact@v8
        with:
          name: release-body

      - name: Update Draft Status (Zipping Integration)
        shell: bash
        run: |
          cp release_body.md updated_draft_body.md

      - name: Update Draft Release on GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.versioning.outputs.tag }}
          VERSION: ${{ needs.versioning.outputs.version }}
          IS_PRERELEASE: ${{ needs.versioning.outputs.is_prerelease }}
        shell: bash
        run: |
          release_id=$(gh api "repos/$REPO/releases" --jq '.[] | select(.tag_name=="'$TAG'" or .name=="Release '$VERSION'") | select(.draft==true) | .id')
          if [ -n "$release_id" ]; then
            gh api -X PATCH "repos/$REPO/releases/$release_id" \
              -f tag_name="$TAG" \
              -f name="Release $VERSION" \
              -f body_path="updated_draft_body.md" \
              -F draft=true \
              -F prerelease=$( [ "$IS_PRERELEASE" = "true" ] && echo "true" || echo "false" )
          fi

  gh-release:
    needs: [versioning, sync-version]
    if: always() && needs.versioning.result == 'success' && needs.sync-version.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: 📦 Zip Component
        run: |
          zip -r chefkoch_ha.zip custom_components/chefkoch_ha

      - name: Download Release Body Artifact
        uses: actions/download-artifact@v8
        with:
          name: release-body

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.versioning.outputs.tag }}
          VERSION: ${{ needs.versioning.outputs.version }}
          IS_PRERELEASE: ${{ needs.versioning.outputs.is_prerelease }}
        shell: bash
        run: |
          # Find existing draft release
          release_id=$(gh api "repos/$REPO/releases" --jq '.[] | select(.tag_name=="'$TAG'" or .name=="Release '$VERSION'") | select(.draft==true) | .id')
          
          # Set prerelease argument
          prerelease_arg=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            prerelease_arg="--prerelease"
          fi
          
          if [ -n "$release_id" ]; then
            # Update the existing draft release to publish it
            gh api -X PATCH "repos/$REPO/releases/$release_id" \
              -f tag_name="$TAG" \
              -f name="Release $VERSION" \
              -f body_path="release_body.md" \
              -F draft=false \
              -F prerelease=$( [ "$IS_PRERELEASE" = "true" ] && echo "true" || echo "false" )
              
            # Upload the assets to the published release
            gh release upload "$TAG" chefkoch_ha.zip --clobber
          else
            # Create a brand new release if no draft exists
            gh release create "$TAG" \
              --target "${{ github.ref_name }}" \
              --title "Release $VERSION" \
              --notes-file "release_body.md" \
              $prerelease_arg \
              chefkoch_ha.zip
          fi
 
      - name: Post-Release Dev Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git reset --hard HEAD
          git pull --rebase origin ${{ github.ref_name }}
          git fetch --tags
          NEW_DEV=$(python .github/scripts/version_manager.py bump --type dev --level patch)
          if ! git diff --quiet; then
            git commit -am "chore(dev): bump to $NEW_DEV [skip ci]"
            git push origin HEAD:${{ github.ref_name }} || (git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }})
          fi

  cleanup-release:
    needs: [versioning, sync-version, gh-release]
    if: always() && needs.versioning.result == 'success' && (needs.sync-version.result == 'failure' || needs.gh-release.result == 'failure' || cancelled())
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.versioning.outputs.tag }}
        shell: bash
        run: |
          release_id=$(gh api "repos/$REPO/releases" --jq '.[] | select(.tag_name=="'$TAG'") | select(.draft==true) | .id')
          if [ -n "$release_id" ]; then
            gh api -X DELETE "repos/$REPO/releases/$release_id"
            gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          fi

name: Bug Report
description: Report a bug or unexpected behavior in the Chefkoch integration
title: '[Bug]: '
labels: ['bug', 'triage']
assignees:
  - FaserF
body:
  - type: markdown
    attributes:
      value: |
        ## Before You Submit
        - 🔍 Search [existing issues](https://github.com/FaserF/ha-chefkoch/issues) to avoid duplicates.
        - 📖 Check the [documentation](https://github.com/FaserF/ha-chefkoch/blob/master/README.md).
        - 🏠 View the integration: [![Open your Home Assistant instance and show the integration.](https://my.home-assistant.io/badges/integration.svg)](https://my.home-assistant.io/redirect/integration/?domain=chefkoch)

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: Which version of the Chefkoch integration are you using?
      placeholder: e.g. 1.2.0
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: |
        Which version of Home Assistant are you running?
        [![Open your Home Assistant instance and show your Home Assistant information.](https://my.home-assistant.io/badges/info.svg)](https://my.home-assistant.io/redirect/info/)
      placeholder: e.g. 2025.6.0
    validations:
      required: true

  - type: dropdown
    id: ha_installation_type
    attributes:
      label: Home Assistant Installation Type
      description: How is Home Assistant installed?
      options:
        - Home Assistant OS
        - Home Assistant Container
        - Home Assistant Supervised
        - Home Assistant Core
    validations:
      required: true

  - type: input
    id: search_query_url
    attributes:
      label: Search Query / Recipe URL
      description: What search query or recipe URL were you using? (if applicable)
      placeholder: e.g. "Pasta" or https://www.chefkoch.de/rezepte/...
    validations:
      required: false

  - type: textarea
    id: bug_description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostic Information
      description: |
        Paste diagnostic information here (optional but helpful). Download from:
        [![Open your Home Assistant instance and show the integration diagnostics.](https://my.home-assistant.io/badges/diagnostics.svg)](https://my.home-assistant.io/redirect/diagnostics/)
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output here. Enable debug logging for the integration if possible.
      render: shell
    validations:
      required: false
